baseURL: "https://dayou.tech/"
languageCode: "zh-cn"
title: "dayou.tech"

module:
  imports:
    - path: "github.com/adityatelange/hugo-PaperMod"

params:
  defaultTheme: dark
  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  homeInfoParams:
    Title: "dayou.tech"
    Content: "探索 AI Agent、前沿科技与深度思考"
  socialIcons:
    - name: github
      url: "https://github.com/luoz8881-tech"

menu:
  main:
    - identifier: posts
      name: "文章"
      url: "/posts/"
      weight: 10
    - identifier: tags
      name: "标签"
      url: "/tags/"
      weight: 20

outputs:
  home:
    - HTML
    - RSS
    - JSON
