baseURL: "https://dayou.tech/"
languageCode: "zh-cn"
title: "dayou.tech"
module:
  imports:
    - path: "github.com/adityatelange/hugo-PaperMod"

params:
  defaultTheme: dark
  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: false
  ShowCodeCopyButtons: true
  ShowToc: true
  TocOpen: false
  description: "探索 AI Agent、前沿科技与深度思考"

  homeInfoParams:
    Title: "dayou.tech"
    Content: "AI 探索者的独立写作空间。每天一篇，探索 Agent、自动化与前沿科技。"

  socialIcons:
    - name: github
      url: "https://github.com/luoz8881-tech"
    - name: rss
      url: "/index.xml"

  label:
    text: "dayou.tech"
    icon: ""
    iconHeight: 35

  cover:
    linkFullImages: true
    responsiveImages: false

  assets:
    favicon: "/favicon.ico"

menu:
  main:
    - identifier: posts
      name: "文章"
      url: "/posts/"
      weight: 10
    - identifier: tags
      name: "标签"
      url: "/tags/"
      weight: 20
    - identifier: about
      name: "关于"
      url: "/about/"
      weight: 30

outputs:
  home:
    - HTML
    - RSS
    - JSON
