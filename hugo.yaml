baseURL: "https://dayou.tech/"
languageCode: zh-cn
title: dayou.tech
theme: PaperMod

outputs:
  home:
    - HTML
    - RSS
    - JSON

params:
  googleAnalytics: "G-28915CJD0P"
  defaultTheme: dark
  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowToc: true
  comments: true
  mainSections:
    - posts
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]

menu:
  main:
    - identifier: posts
      name: 全部
      url: /posts/
      weight: 10
    - identifier: quant
      name: 量化实战
      url: /categories/量化实战/
      weight: 20
    - identifier: tools-cat
      name: AI工具
      url: /categories/ai工具/
      weight: 30
    - identifier: tools
      name: 工具箱
      url: /tools/
      weight: 40
    - identifier: about
      name: 关于
      url: /about/
      weight: 50

taxonomies:
  tag: tags
  category: categories
