baseURL: "https://dayou.tech/"
languageCode: zh-cn
title: dayou.tech
theme: PaperMod

outputs:
  home:
    - HTML
    - RSS
    - JSON

params:
  googleAnalytics: "G-28915CJD0P"
  defaultTheme: dark
  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowToc: true
  comments: true
  mainSections:
    - posts
  homeInfoParams:
    Title: "大有 · AI 实践者"
    Content: >
      不写代码的普通人，用 AI 搭网站、连服务器、做自动化。
      从一只「龙虾」（LobeChat）开始，每篇文章都是真实操作记录。
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]

menu:
  main:
    - identifier: posts
      name: 文章
      url: /posts/
      weight: 10
    - identifier: categories
      name: 分类
      url: /categories/
      weight: 15
    - identifier: tools
      name: 工具箱
      url: /tools/
      weight: 20
    - identifier: tags
      name: 标签
      url: /tags/
      weight: 25
    - identifier: search
      name: 搜索
      url: /search/
      weight: 30
    - identifier: about
      name: 关于
      url: /about/
      weight: 40

taxonomies:
  tag: tags
  category: categories
